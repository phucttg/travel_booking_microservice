limit_req_zone $binary_remote_addr zone=auth_ip:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=write_ip:20m rate=120r/m;
limit_req_zone $binary_remote_addr zone=read_ip:20m rate=300r/m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /health/live {
        default_type application/json;
        return 200 '{"service":"frontend","status":"alive"}';
    }

    location = /health/ready {
        default_type application/json;
        return 200 '{"service":"frontend","ready":true,"state":"ready"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth public endpoints
    location = /api/v1/identity/login {
        limit_req zone=auth_ip burst=40 nodelay;
        proxy_pass http://identity:3333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/identity/register {
        limit_req zone=auth_ip burst=40 nodelay;
        proxy_pass http://identity:3333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/identity/refresh-token {
        limit_req zone=auth_ip burst=40 nodelay;
        proxy_pass http://identity:3333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Write-heavy routes
    location = /api/v1/booking/create {
        limit_req zone=write_ip burst=240 nodelay;
        proxy_pass http://booking:3366;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/wallet/pay-booking {
        limit_req zone=write_ip burst=240 nodelay;
        proxy_pass http://payment:3377;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/wallet/topup-requests {
        limit_req zone=write_ip burst=240 nodelay;
        proxy_pass http://payment:3377;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/seat/reserve {
        limit_req zone=write_ip burst=240 nodelay;
        proxy_pass http://flight:3344;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/payment/confirm/[^/]+$ {
        limit_req zone=write_ip burst=240 nodelay;
        proxy_pass http://payment:3377;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/payment/reconcile-manual {
        limit_req zone=write_ip burst=240 nodelay;
        proxy_pass http://payment:3377;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Read/API defaults
    location /api/v1/identity {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://identity:3333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/user {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://identity:3333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/flight {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://flight:3344;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/seat {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://flight:3344;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/airport {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://flight:3344;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/aircraft {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://flight:3344;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/passenger {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://passenger:3355;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/booking {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://booking:3366;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/wallet {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://payment:3377;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/payment {
        limit_req zone=read_ip burst=600 nodelay;
        proxy_pass http://payment:3377;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
