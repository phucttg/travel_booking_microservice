# Local Prometheus configuration for the Docker Compose observability overlay.
# Scrapes the OpenTelemetry Collector's Prometheus endpoints and Prometheus itself.

global:
  scrape_interval: 5s

otlp:
  promote_resource_attributes:
  - service.instance.id
  - service.name
  - service.namespace
  - service.version

scrape_configs:
- job_name: "otel-collector"
  scrape_interval: 10s
  static_configs:
  - targets: [ 'otel-collector:8889' ]
  - targets: [ 'otel-collector:8888' ]

- job_name: "prometheus"
  static_configs:
  - targets: [ "prometheus:9090" ]
