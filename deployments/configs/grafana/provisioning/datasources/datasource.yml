# Grafana datasource provisioning for the local observability overlay.
# Keeps Prometheus, Tempo, and Loki wired together with stable datasource UIDs.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    typeName: Prometheus
    uid: prometheus-uid
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    readOnly: false
    user: ''
    database: ''
    version: 1
    editable: false
    jsonData:
      httpMethod: GET

  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    basicAuth: false
    isDefault: false
    version: 1
    editable: false
    apiVersion: 1
    uid: tempo-uid
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus-uid
      streamingEnabled:
        search: true
        
  - name: Loki
    type: loki
    access: proxy
    uid: loki-uid
    url: http://loki:3100
    user: ''
    database: ''
    readOnly: false
    jsonData:
      # Link trace ids found in Loki log lines back to Tempo.
      derivedFields:
        - datasourceUid: tempo-uid
          matcherRegex: "^.*?traceI[d|D]=(\\w+).*$"
          name: traceId
          url: '$${__value.raw}'
          
