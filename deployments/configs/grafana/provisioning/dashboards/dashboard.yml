# Grafana dashboard provisioning for dashboards mounted into the local container.
apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 5 # Re-scan mounted dashboard files during local development.
    options:
      path: /var/lib/grafana/dashboards # Includes bundled baseline dashboard JSON files.
