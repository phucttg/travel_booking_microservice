# Local OpenTelemetry Collector configuration for the Docker Compose observability overlay.
# Receives OTLP traces, metrics, and logs from services, applies shared processors,
# and exports signals to Prometheus, Tempo, Loki, Aspire, and debug output.

receivers:

  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
  transform/environment:
    error_mode: ignore
    trace_statements:
    - context: resource
      statements:
      - set(attributes["environment"], "development")
    log_statements:
    - context: resource
      statements:
      - set(attributes["environment"], "development")
    metric_statements:
    - context: resource
      statements:
      - set(attributes["environment"], "development")

exporters:

  debug: 

  # Prometheus exporter metrics
  prometheus:
    endpoint: ${env:PROMETHEUS_ENDPOINT:-"0.0.0.0:8889"}

  prometheusremotewrite:
    endpoint: ${env:PROMETHEUS_REMOTE_WRITE_ENDPOINT:-"http://prometheus:9090/api/v1/write"}

  otlphttp/loki:
    endpoint: ${env:LOKI_ENDPOINT:-"http://loki:3100/otlp"}
    tls:
      insecure: true

  otlp/tempo:
    endpoint: ${env:TEMPO_ENDPOINT:-"http://tempo:4317"}
    tls:
      insecure: true

  # export telemetry data to aspire dashboard
  otlp/aspire:
    endpoint: ${env:ASPIRE_OTLP_ENDPOINT}
    headers:
      x-otlp-api-key: ${env:ASPIRE_API_KEY}
    tls:
      insecure: true
      insecure_skip_verify: true 

extensions:
  pprof:
    endpoint: 0.0.0.0:1888
  zpages:
    endpoint: 0.0.0.0:55679
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [ pprof, zpages, health_check ]
  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ debug, otlp/tempo, otlp/aspire ]
    metrics:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ debug, prometheusremotewrite, prometheus, otlp/aspire ]
    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlphttp/loki, otlp/aspire ]
