# Dev-only Docker Compose manifest for local development.
services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - booking

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - booking

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./../configs/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - booking

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./../configs/prometheus.yaml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-remote-write-receiver"
      - "--log.level=debug"
    networks:
      - booking

  tempo:
    image: grafana/tempo:2.10.1
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./../configs/tempo.yaml:/etc/tempo.yaml
    expose:
      - "3200"
      - "9095"
      - "4317"
      - "4318"
    networks:
      - booking

  loki:
    image: grafana/loki:3.6.7
    hostname: loki
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./../configs/loki-config.yaml:/etc/loki/local-config.yaml
    expose:
      - "3100"
      - "9096"
    networks:
      - booking

  grafana:
    image: grafana/grafana:12.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./../configs/grafana/provisioning:/etc/grafana/provisioning
      - ./../configs/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - booking

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./../configs/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "11888:1888"
      - "8888:8888"
      - "8889:8889"
      - "13133:13133"
      - "4317:4317"
      - "4318:4318"
      - "55679:55679"
    environment:
      ASPIRE_OTLP_ENDPOINT: http://aspire-dashboard:18889
      ASPIRE_API_KEY: your_api_key
      PROMETHEUS_ENDPOINT: 0.0.0.0:8889
      PROMETHEUS_REMOTE_WRITE_ENDPOINT: http://prometheus:9090/api/v1/write
      LOKI_ENDPOINT: http://loki:3100/otlp
      TEMPO_ENDPOINT: http://tempo:4317
    networks:
      - booking

  identity:
    build:
      context: ../..
      dockerfile: src/identity/Dockerfile
    container_name: identity
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    env_file:
      - ../../src/identity/.env.docker
    expose:
      - "3333"
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:3333/health/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - booking

  flight:
    build:
      context: ../..
      dockerfile: src/flight/Dockerfile
    container_name: flight
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    env_file:
      - ../../src/flight/.env.docker
    expose:
      - "3344"
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:3344/health/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - booking

  passenger:
    build:
      context: ../..
      dockerfile: src/passenger/Dockerfile
    container_name: passenger
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    env_file:
      - ../../src/passenger/.env.docker
    expose:
      - "3355"
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:3355/health/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - booking

  booking:
    build:
      context: ../..
      dockerfile: src/booking/Dockerfile
    container_name: booking
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    env_file:
      - ../../src/booking/.env.docker
    expose:
      - "3366"
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:3366/health/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - booking

  payment:
    build:
      context: ../..
      dockerfile: src/payment/Dockerfile
    container_name: payment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    env_file:
      - ../../src/payment/.env.docker
    expose:
      - "3377"
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:3377/health/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - booking

  frontend:
    build:
      context: ../../src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      identity:
        condition: service_healthy
      flight:
        condition: service_healthy
      passenger:
        condition: service_healthy
      booking:
        condition: service_healthy
      payment:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - booking
    restart: unless-stopped

networks:
  booking:

volumes:
  postgres-data:
