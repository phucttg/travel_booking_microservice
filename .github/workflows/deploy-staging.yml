name: Deploy Staging

on:
  workflow_run:
    workflows: ["Main Build Release"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download release manifest from S3
        run: |
          aws s3 cp \
            "s3://${{ vars.RELEASE_MANIFEST_BUCKET }}/releases/by-git-sha/${{ github.event.workflow_run.head_sha }}.json" \
            release-manifest.json

      - name: Run migration tasks
        run: |
          services="$(jq -r '.migratableServices[]?' release-manifest.json)"

          if [[ -z "$services" ]]; then
            exit 0
          fi

          while IFS= read -r service; do
            current_task_definition="$(
              aws ecs describe-services \
                --cluster "${{ vars.ECS_CLUSTER }}" \
                --services "$service" \
                --query 'services[0].taskDefinition' \
                --output text
            )"

            overrides="$(jq -nc \
              --arg service "$service" \
              '{
                containerOverrides: [
                  {
                    name: $service,
                    command: ["dist/migrate.js", "run"],
                    environment: [
                      { name: "APP_ENV", value: "staging" },
                      { name: "POSTGRES_MIGRATIONS_RUN", value: "false" },
                      { name: "BOOTSTRAP_SEED_ENABLED", value: "false" }
                    ]
                  }
                ]
              }')"

            task_arn="$(
              aws ecs run-task \
                --cluster "${{ vars.ECS_CLUSTER }}" \
                --launch-type FARGATE \
                --task-definition "$current_task_definition" \
                --network-configuration "awsvpcConfiguration={subnets=[${{ vars.ECS_PRIVATE_SUBNETS }}],securityGroups=[${{ vars.ECS_SECURITY_GROUPS }}],assignPublicIp=DISABLED}" \
                --overrides "$overrides" \
                --query 'tasks[0].taskArn' \
                --output text
            )"

            aws ecs wait tasks-stopped --cluster "${{ vars.ECS_CLUSTER }}" --tasks "$task_arn"

            exit_code="$(
              aws ecs describe-tasks \
                --cluster "${{ vars.ECS_CLUSTER }}" \
                --tasks "$task_arn" \
                --query 'tasks[0].containers[?name==`'"$service"'`][0].exitCode' \
                --output text
            )"

            if [[ "$exit_code" != "0" ]]; then
              echo "Migration task failed for $service" >&2
              exit 1
            fi
          done <<< "$services"

      - name: Register task definition revisions and deploy services
        run: |
          services="$(jq -r '.services[]?' release-manifest.json)"

          if [[ -z "$services" ]]; then
            exit 0
          fi

          while IFS= read -r service; do
            image_ref="$(jq -r --arg service "$service" '.imageDigests[$service]' release-manifest.json)"
            current_task_definition="$(
              aws ecs describe-services \
                --cluster "${{ vars.ECS_CLUSTER }}" \
                --services "$service" \
                --query 'services[0].taskDefinition' \
                --output text
            )"

            aws ecs describe-task-definition --task-definition "$current_task_definition" > current-task-definition.json

            node deployments/scripts/prepare-ecs-task-definition.mjs \
              --input current-task-definition.json \
              --service "$service" \
              --image "$image_ref" \
              --app-env staging \
              --output next-task-definition.json

            next_task_definition="$(
              aws ecs register-task-definition \
                --cli-input-json file://next-task-definition.json \
                --query 'taskDefinition.taskDefinitionArn' \
                --output text
            )"

            aws ecs update-service \
              --cluster "${{ vars.ECS_CLUSTER }}" \
              --service "$service" \
              --task-definition "$next_task_definition" \
              --force-new-deployment \
              --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true}"

            aws ecs wait services-stable --cluster "${{ vars.ECS_CLUSTER }}" --services "$service"
          done <<< "$services"

      - name: Bootstrap smoke user
        run: bash deployments/scripts/ensure-smoke-user.sh
        env:
          BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          SMOKE_USER_NAME: ${{ vars.SMOKE_USER_NAME }}
          SMOKE_USER_PASSPORT: ${{ vars.SMOKE_USER_PASSPORT }}
          SMOKE_USER_AGE: ${{ vars.SMOKE_USER_AGE }}
          SMOKE_USER_PASSENGER_TYPE: ${{ vars.SMOKE_USER_PASSENGER_TYPE }}

      - name: Run staging smoke suite
        run: bash deployments/scripts/api-smoke.sh
        env:
          BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          IDENTITY_READY_URL: ${{ vars.IDENTITY_READY_URL }}
          FLIGHT_READY_URL: ${{ vars.FLIGHT_READY_URL }}
          PASSENGER_READY_URL: ${{ vars.PASSENGER_READY_URL }}
          BOOKING_READY_URL: ${{ vars.BOOKING_READY_URL }}
          PAYMENT_READY_URL: ${{ vars.PAYMENT_READY_URL }}
