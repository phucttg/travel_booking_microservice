name: PR CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend_shared: ${{ steps.filter.outputs.backend_shared }}
      identity: ${{ steps.filter.outputs.identity }}
      flight: ${{ steps.filter.outputs.flight }}
      passenger: ${{ steps.filter.outputs.passenger }}
      booking: ${{ steps.filter.outputs.booking }}
      payment: ${{ steps.filter.outputs.payment }}
      frontend: ${{ steps.filter.outputs.frontend }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_shared:
              - 'src/building-blocks/**'
              - '.dockerignore'
            identity:
              - 'src/identity/**'
            flight:
              - 'src/flight/**'
            passenger:
              - 'src/passenger/**'
            booking:
              - 'src/booking/**'
            payment:
              - 'src/payment/**'
            frontend:
              - 'src/frontend/**'
            compose:
              - 'deployments/**'
              - 'Makefile'
              - '.github/workflows/**'
              - '.github/CODEOWNERS'

  identity:
    needs: changes
    if: needs.changes.outputs.identity == 'true' || needs.changes.outputs.backend_shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: |
            src/building-blocks/package-lock.json
            src/identity/package-lock.json

      - name: Build building-blocks
        run: |
          npm ci
          npm run build
        working-directory: ./src/building-blocks

      - name: Build identity
        run: |
          npm ci
          npm run build
        working-directory: ./src/identity

      - name: Test identity
        run: npm test
        working-directory: ./src/identity
        env:
          NODE_ENV: test
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-1234

      - name: Validate identity Docker image
        run: docker build -f src/identity/Dockerfile .

  flight:
    needs: changes
    if: needs.changes.outputs.flight == 'true' || needs.changes.outputs.backend_shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: |
            src/building-blocks/package-lock.json
            src/flight/package-lock.json

      - name: Build building-blocks
        run: |
          npm ci
          npm run build
        working-directory: ./src/building-blocks

      - name: Build flight
        run: |
          npm ci
          npm run build
        working-directory: ./src/flight

      - name: Test flight
        run: npm test -- seat-pricing.test.ts
        working-directory: ./src/flight
        env:
          NODE_ENV: test
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-1234

      - name: Validate flight Docker image
        run: docker build -f src/flight/Dockerfile .

  passenger:
    needs: changes
    if: needs.changes.outputs.passenger == 'true' || needs.changes.outputs.backend_shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: |
            src/building-blocks/package-lock.json
            src/passenger/package-lock.json

      - name: Build building-blocks
        run: |
          npm ci
          npm run build
        working-directory: ./src/building-blocks

      - name: Build passenger
        run: |
          npm ci
          npm run build
        working-directory: ./src/passenger

      - name: Test passenger
        run: npm test -- create-user.test.ts update-user.test.ts
        working-directory: ./src/passenger
        env:
          NODE_ENV: test
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-1234

      - name: Validate passenger Docker image
        run: docker build -f src/passenger/Dockerfile .

  booking:
    needs: changes
    if: needs.changes.outputs.booking == 'true' || needs.changes.outputs.backend_shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: |
            src/building-blocks/package-lock.json
            src/booking/package-lock.json

      - name: Build building-blocks
        run: |
          npm ci
          npm run build
        working-directory: ./src/building-blocks

      - name: Build booking
        run: |
          npm ci
          npm run build
        working-directory: ./src/booking

      - name: Test booking
        run: npm test -- create-booking.handler.test.ts
        working-directory: ./src/booking
        env:
          NODE_ENV: test
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-1234

      - name: Validate booking Docker image
        run: docker build -f src/booking/Dockerfile .

  payment:
    needs: changes
    if: needs.changes.outputs.payment == 'true' || needs.changes.outputs.backend_shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: |
            src/building-blocks/package-lock.json
            src/payment/package-lock.json

      - name: Build building-blocks
        run: |
          npm ci
          npm run build
        working-directory: ./src/building-blocks

      - name: Build payment
        run: |
          npm ci
          npm run build
        working-directory: ./src/payment

      - name: Test payment
        run: |
          npm test -- confirm-payment.handler.test.ts
          npm test -- reconcile-manual.handler.test.ts
          npm test -- pay-booking-with-wallet.handler.test.ts
        working-directory: ./src/payment
        env:
          NODE_ENV: test
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-1234

      - name: Validate payment Docker image
        run: docker build -f src/payment/Dockerfile .

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./src/frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./src/frontend

      - name: Test frontend
        run: |
          npm test -- create-booking-flow.test.tsx
          npm test -- booking-status-and-cancel.test.tsx presentation.rules.test.ts
        working-directory: ./src/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./src/frontend

      - name: Run frontend smoke
        run: npm run e2e -- --grep "login page renders"
        working-directory: ./src/frontend
        env:
          CI: "true"
          VITE_APP_TITLE: SkyBooking

  compose-config:
    needs: changes
    if: |
      needs.changes.outputs.compose == 'true' ||
      needs.changes.outputs.backend_shared == 'true' ||
      needs.changes.outputs.identity == 'true' ||
      needs.changes.outputs.flight == 'true' ||
      needs.changes.outputs.passenger == 'true' ||
      needs.changes.outputs.booking == 'true' ||
      needs.changes.outputs.payment == 'true' ||
      needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate docker compose files
        run: |
          bash deployments/scripts/dev-up.sh config > /dev/null
          bash deployments/scripts/dev-up.sh --rds config > /dev/null
          bash deployments/scripts/dev-up.sh --observability config > /dev/null
          bash deployments/scripts/dev-up.sh --rds --observability config > /dev/null
